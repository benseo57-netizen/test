<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>우리사주 수익 계산기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 16px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 28px 20px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    }

    h1 {
      color: #fff;
      font-size: clamp(20px, 5.5vw, 26px);
      font-weight: 700;
      text-align: center;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: rgba(255,255,255,0.45);
      font-size: clamp(13px, 3.5vw, 15px);
      text-align: center;
      margin-bottom: 24px;
    }

    .input-group {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 28px;
    }

    .input-label {
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .input-row {
      display: flex;
      align-items: center;
      background: rgba(0,0,0,0.3);
      border: 2px solid rgba(255,221,0,0.5);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .input-row:focus-within { border-color: #ffdd00; }

    input[type="number"] {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #ffdd00;
      font-size: clamp(26px, 7vw, 34px);
      font-weight: 700;
      padding: 16px 16px;
      font-family: inherit;
      text-align: right;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

    .currency-tag {
      color: rgba(255,221,0,0.6);
      font-size: 15px;
      font-weight: 600;
      padding: 0 16px 0 4px;
    }

    .quick-btns {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .quick-btn {
      flex: 1;
      min-width: 60px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      color: rgba(255,255,255,0.7);
      font-size: clamp(13px, 3.5vw, 15px);
      padding: 12px 4px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      text-align: center;
    }
    .quick-btn:hover {
      background: rgba(255,221,0,0.15);
      border-color: rgba(255,221,0,0.4);
      color: #ffdd00;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 28px;
    }

    .info-item {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 14px 16px;
      border: 1px solid rgba(255,255,255,0.07);
    }
    .info-item .label {
      color: rgba(255,255,255,0.4);
      font-size: clamp(12px, 3vw, 13px);
      margin-bottom: 4px;
    }
    .info-item .value {
      color: rgba(255,255,255,0.85);
      font-size: clamp(15px, 4vw, 17px);
      font-weight: 600;
    }

    .result-section {
      background: rgba(255,255,255,0.04);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .result-row:last-child { border-bottom: none; }

    .result-row .r-label {
      color: rgba(255,255,255,0.5);
      font-size: clamp(13px, 3.5vw, 15px);
    }
    .result-row .r-value {
      color: rgba(255,255,255,0.85);
      font-size: clamp(14px, 3.8vw, 16px);
      font-weight: 600;
    }

    .profit-box {
      background: linear-gradient(135deg, rgba(0,200,100,0.15), rgba(0,150,80,0.08));
      border: 1px solid rgba(0,200,100,0.3);
      border-radius: 16px;
      padding: 22px;
      text-align: center;
      margin-top: 16px;
      transition: all 0.3s;
    }
    .profit-box.loss {
      background: linear-gradient(135deg, rgba(255,80,80,0.15), rgba(200,50,50,0.08));
      border-color: rgba(255,80,80,0.3);
    }

    .profit-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 8px;
    }

    .profit-amount {
      font-size: clamp(32px, 9vw, 44px);
      font-weight: 700;
      color: #00e676;
      letter-spacing: -1px;
      line-height: 1;
      transition: color 0.3s;
    }
    .profit-amount.loss { color: #ff5252; }

    .profit-rate {
      font-size: 15px;
      font-weight: 600;
      color: rgba(0,230,118,0.7);
      margin-top: 6px;
      transition: color 0.3s;
    }
    .profit-rate.loss { color: rgba(255,82,82,0.7); }

    .badge {
      display: inline-block;
      background: rgba(255,221,0,0.15);
      border: 1px solid rgba(255,221,0,0.3);
      border-radius: 20px;
      color: #ffdd00;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      margin-top: 10px;
    }

    footer {
      text-align: center;
      margin-top: 24px;
      color: rgba(255,255,255,0.2);
      font-size: 11px;
    }
  </style>
</head>
<body>
<div class="card">
  <h1>🏢 우리사주 수익 계산기</h1>
  <p class="subtitle">현재 주가를 입력하면 수익을 바로 계산합니다</p>

  <div class="input-group">
    <div class="input-label">📌 현재 주가 입력</div>
    <div class="input-row">
      <input type="number" id="currentPrice" placeholder="100,000" value="100000" oninput="calculate()" />
      <span class="currency-tag">원</span>
    </div>
    <div class="quick-btns">
      <button class="quick-btn" onclick="setPrice(50000)">5만원</button>
      <button class="quick-btn" onclick="setPrice(70000)">7만원</button>
      <button class="quick-btn" onclick="setPrice(100000)">10만원</button>
      <button class="quick-btn" onclick="setPrice(150000)">15만원</button>
      <button class="quick-btn" onclick="setPrice(200000)">20만원</button>
    </div>
  </div>

  <div class="info-grid">
    <div class="info-item">
      <div class="label">총 주식수</div>
      <div class="value">2,493 주</div>
    </div>
    <div class="info-item">
      <div class="label">취득가격</div>
      <div class="value">50,000 원</div>
    </div>
    <div class="info-item">
      <div class="label">보유 주식수</div>
      <div class="value">1,893 주</div>
    </div>
    <div class="info-item">
      <div class="label">대출액</div>
      <div class="value">61,600,000 원</div>
    </div>
  </div>

  <div class="result-section">
    <div class="result-row">
      <span class="r-label">보유주식 평가금액</span>
      <span class="r-value" id="holdingValue">—</span>
    </div>
    <div class="result-row">
      <span class="r-label">타인주식 평가금액 (600주)</span>
      <span class="r-value" id="otherValue">—</span>
    </div>
    <div class="result-row">
      <span class="r-label">전체 평가금액</span>
      <span class="r-value" id="totalValue">—</span>
    </div>
    <div class="result-row">
      <span class="r-label">대출 차감</span>
      <span class="r-value" style="color:#ff5252">- 61,600,000 원</span>
    </div>
  </div>

  <div class="profit-box" id="profitBox">
    <div class="profit-label">🎯 순 수익 (보유주식 기준)</div>
    <div class="profit-amount" id="profitAmount">—</div>
    <div class="profit-rate" id="profitRate"></div>
    <div class="badge" id="priceBadge"></div>
  </div>

  <footer>취득가 50,000원 기준 · 보유 1,893주 · 대출 61,600,000원</footer>
</div>

<script>
  const TOTAL_SHARES   = 2493;
  const MY_SHARES      = 1893;
  const OTHER_SHARES   = 600;
  const ACQUIRE_PRICE  = 50000;
  const LOAN_AMOUNT    = 61600000;

  function fmt(n) {
    return n.toLocaleString('ko-KR') + ' 원';
  }

  function setPrice(p) {
    document.getElementById('currentPrice').value = p;
    calculate();
  }

  function calculate() {
    const price = parseFloat(document.getElementById('currentPrice').value) || 0;

    const holdingVal  = MY_SHARES    * price;
    const otherVal    = OTHER_SHARES * price;
    const totalVal    = holdingVal + otherVal;
    const profit      = holdingVal - LOAN_AMOUNT;

    const costBase    = MY_SHARES * ACQUIRE_PRICE;
    const rateVsCost  = costBase > 0 ? ((profit / costBase) * 100) : 0;
    const priceRatio  = ((price / ACQUIRE_PRICE) * 100).toFixed(1);

    document.getElementById('holdingValue').textContent = fmt(holdingVal);
    document.getElementById('otherValue').textContent   = fmt(otherVal);
    document.getElementById('totalValue').textContent   = fmt(totalVal);

    const amtEl   = document.getElementById('profitAmount');
    const rateEl  = document.getElementById('profitRate');
    const boxEl   = document.getElementById('profitBox');
    const badgeEl = document.getElementById('priceBadge');

    amtEl.textContent  = (profit >= 0 ? '+' : '') + fmt(profit);
    rateEl.textContent = (rateVsCost >= 0 ? '+' : '') + rateVsCost.toFixed(1) + '%  (취득원가 대비)';
    badgeEl.textContent = `현재가 = 취득가의 ${priceRatio}%`;

    if (profit >= 0) {
      amtEl.className  = 'profit-amount';
      rateEl.className = 'profit-rate';
      boxEl.className  = 'profit-box';
    } else {
      amtEl.className  = 'profit-amount loss';
      rateEl.className = 'profit-rate loss';
      boxEl.className  = 'profit-box loss';
    }
  }

  calculate();
</script>
</body>
</html>
