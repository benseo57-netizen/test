<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>우리사주 수익 계산기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      min-height: 100dvh;
    }

    body {
      font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }

    /* 모바일: 전체화면 */
    .card {
      width: 100%;
      min-height: 100dvh;
      padding: 36px 18px 48px;
      display: flex;
      flex-direction: column;
    }

    /* 데스크톱: 카드 형태 */
    @media (min-width: 600px) {
      body {
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 40px 20px;
      }
      .card {
        min-height: auto;
        max-width: 480px;
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 24px;
        box-shadow: 0 25px 60px rgba(0,0,0,0.4);
      }
    }

    h1 {
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 4px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: rgba(255,255,255,0.4);
      font-size: 14px;
      text-align: center;
      margin-bottom: 28px;
    }

    .input-group {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .input-label {
      color: rgba(255,255,255,0.55);
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .input-row {
      display: flex;
      align-items: center;
      background: rgba(0,0,0,0.3);
      border: 2px solid rgba(255,221,0,0.5);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .input-row:focus-within { border-color: #ffdd00; }

    input#currentPrice {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #ffdd00;
      font-size: 30px;
      font-weight: 700;
      padding: 14px 12px;
      font-family: inherit;
      text-align: right;
      caret-color: #ffdd00;
    }

    .currency-tag {
      color: rgba(255,221,0,0.6);
      font-size: 16px;
      font-weight: 600;
      padding: 0 14px 0 4px;
    }

    .quick-btns {
      display: flex;
      gap: 7px;
      margin-top: 12px;
    }

    .quick-btn {
      flex: 1;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      padding: 12px 2px;
      cursor: pointer;
      font-family: inherit;
      text-align: center;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .quick-btn:active {
      background: rgba(255,221,0,0.2);
      border-color: rgba(255,221,0,0.5);
      color: #ffdd00;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 20px;
    }

    .info-item {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 14px;
      border: 1px solid rgba(255,255,255,0.07);
    }
    .info-item .label {
      color: rgba(255,255,255,0.38);
      font-size: 12px;
      margin-bottom: 5px;
    }
    .info-item .value {
      color: rgba(255,255,255,0.85);
      font-size: 15px;
      font-weight: 600;
    }

    .calc-box {
      background: rgba(255,255,255,0.04);
      border-radius: 16px;
      padding: 18px 20px;
      border: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 12px;
    }

    .calc-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
    }
    .calc-row .c-label {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
    }
    .calc-row .c-value {
      color: rgba(255,255,255,0.85);
      font-size: 15px;
      font-weight: 600;
    }
    .calc-row .c-value.red { color: #ff5252; }

    .divider-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
    }
    .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.1); }
    .divider-symbol { color: rgba(255,255,255,0.25); font-size: 18px; }

    .ref-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 12px;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .ref-row .ref-label { color: rgba(255,255,255,0.3); font-size: 12px; }
    .ref-row .ref-value { color: rgba(255,255,255,0.45); font-size: 13px; font-weight: 600; }

    .profit-box {
      background: linear-gradient(135deg, rgba(0,200,100,0.15), rgba(0,150,80,0.08));
      border: 1px solid rgba(0,200,100,0.3);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      transition: all 0.3s;
    }
    .profit-box.loss {
      background: linear-gradient(135deg, rgba(255,80,80,0.15), rgba(200,50,50,0.08));
      border-color: rgba(255,80,80,0.3);
    }

    .profit-label {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.45);
      margin-bottom: 10px;
    }

    .profit-amount {
      font-size: 38px;
      font-weight: 700;
      color: #00e676;
      letter-spacing: -1px;
      line-height: 1;
      transition: color 0.3s;
    }
    .profit-amount.loss { color: #ff5252; }

    .profit-rate {
      font-size: 15px;
      font-weight: 600;
      color: rgba(0,230,118,0.7);
      margin-top: 8px;
      transition: color 0.3s;
    }
    .profit-rate.loss { color: rgba(255,82,82,0.7); }

    .badge {
      display: inline-block;
      background: rgba(255,221,0,0.13);
      border: 1px solid rgba(255,221,0,0.28);
      border-radius: 20px;
      color: #ffdd00;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      margin-top: 10px;
    }

    footer {
      text-align: center;
      margin-top: 24px;
      color: rgba(255,255,255,0.18);
      font-size: 11px;
    }
  </style>
</head>
<body>
<div class="card">
  <h1>🏢 우리사주 수익 계산기</h1>
  <p class="subtitle">현재 주가를 입력하면 수익을 바로 계산합니다</p>

  <div class="input-group">
    <div class="input-label">📌 현재 주가 입력</div>
    <div class="input-row">
      <input id="currentPrice" type="text" inputmode="numeric" placeholder="100,000" />
      <span class="currency-tag">원</span>
    </div>
    <div class="quick-btns">
      <button class="quick-btn" onclick="setPrice(50000)">5만</button>
      <button class="quick-btn" onclick="setPrice(70000)">7만</button>
      <button class="quick-btn" onclick="setPrice(100000)">10만</button>
      <button class="quick-btn" onclick="setPrice(150000)">15만</button>
      <button class="quick-btn" onclick="setPrice(200000)">20만</button>
    </div>
  </div>

  <div class="info-grid">
    <div class="info-item">
      <div class="label">보유 주식수</div>
      <div class="value">1,893 주</div>
    </div>
    <div class="info-item">
      <div class="label">취득가격</div>
      <div class="value">50,000 원</div>
    </div>
    <div class="info-item">
      <div class="label">총 주식수</div>
      <div class="value">2,493 주</div>
    </div>
    <div class="info-item">
      <div class="label">대출액</div>
      <div class="value">61,600,000 원</div>
    </div>
  </div>

  <div class="calc-box">
    <div class="calc-row">
      <span class="c-label">보유주식 평가액 (1,893주)</span>
      <span class="c-value" id="holdingValue">—</span>
    </div>
    <div class="divider-row">
      <div class="divider-line"></div>
      <div class="divider-symbol">−</div>
      <div class="divider-line"></div>
    </div>
    <div class="calc-row">
      <span class="c-label">대출 차감</span>
      <span class="c-value red">- 61,600,000 원</span>
    </div>
  </div>

  <div class="ref-row">
    <span class="ref-label">참고 · 타인주식 평가액 (600주)</span>
    <span class="ref-value" id="otherValue">—</span>
  </div>

  <div class="profit-box" id="profitBox">
    <div class="profit-label">🎯 순 수익 (보유분 평가액 − 대출액)</div>
    <div class="profit-amount" id="profitAmount">—</div>
    <div class="profit-rate" id="profitRate"></div>
    <div class="badge" id="priceBadge"></div>
  </div>

  <footer>취득가 50,000원 기준 · 보유 1,893주 · 대출 61,600,000원</footer>
</div>

<script>
  const MY_SHARES     = 1893;
  const OTHER_SHARES  = 600;
  const ACQUIRE_PRICE = 50000;
  const LOAN_AMOUNT   = 61600000;

  const input = document.getElementById('currentPrice');

  // 숫자만 추출
  function getRawValue() {
    return parseInt(input.value.replace(/,/g, ''), 10) || 0;
  }

  // 입력칸에 콤마 포맷으로 표시
  function formatInput(val) {
    input.value = val > 0 ? val.toLocaleString('ko-KR') : '';
  }

  function fmt(n) {
    return n.toLocaleString('ko-KR') + ' 원';
  }

  function setPrice(p) {
    formatInput(p);
    calculate();
  }

  // 직접 타이핑 시: 숫자 외 문자 제거 후 재포맷
  input.addEventListener('input', function () {
    const raw = parseInt(input.value.replace(/,/g, '').replace(/[^0-9]/g, ''), 10) || 0;
    const pos = input.selectionStart;
    formatInput(raw);
    calculate();
  });

  function calculate() {
    const price = getRawValue();

    const holdingVal = MY_SHARES * price;
    const otherVal   = OTHER_SHARES * price;
    const profit     = holdingVal - LOAN_AMOUNT;

    const costBase   = MY_SHARES * ACQUIRE_PRICE;
    const rateVsCost = costBase > 0 ? (profit / costBase) * 100 : 0;
    const priceRatio = ((price / ACQUIRE_PRICE) * 100).toFixed(1);

    document.getElementById('holdingValue').textContent = fmt(holdingVal);
    document.getElementById('otherValue').textContent   = fmt(otherVal);

    const amtEl   = document.getElementById('profitAmount');
    const rateEl  = document.getElementById('profitRate');
    const boxEl   = document.getElementById('profitBox');
    const badgeEl = document.getElementById('priceBadge');

    amtEl.textContent   = (profit >= 0 ? '+' : '') + fmt(profit);
    rateEl.textContent  = (rateVsCost >= 0 ? '+' : '') + rateVsCost.toFixed(1) + '%  (취득원가 대비)';
    badgeEl.textContent = `현재가 = 취득가의 ${priceRatio}%`;

    if (profit >= 0) {
      amtEl.className  = 'profit-amount';
      rateEl.className = 'profit-rate';
      boxEl.className  = 'profit-box';
    } else {
      amtEl.className  = 'profit-amount loss';
      rateEl.className = 'profit-rate loss';
      boxEl.className  = 'profit-box loss';
    }
  }

  // 초기값 10만원으로 세팅
  setPrice(100000);
</script>
</body>
</html>
