<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>우리사주 수익 계산기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
      /* 배경색을 카드와 통일하여 끊기는 느낌 제거 */
      background: #16213e; 
      min-height: 100vh;
      display: flex;
      justify-content: center;
      color: #fff;
    }

    .container {
      width: 100%;
      max-width: 600px;
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 50px rgba(0,0,0,0.3);
    }

    h1 {
      font-size: clamp(24px, 7.5vw, 32px);
      font-weight: 800;
      text-align: center;
      margin-top: 10px;
      margin-bottom: 6px;
    }

    .subtitle {
      color: rgba(255,255,255,0.4);
      font-size: 14px;
      text-align: center;
      margin-bottom: 30px;
    }

    /* 입력창 디자인 강화 */
    .input-section {
      background: rgba(255,255,255,0.07);
      border-radius: 24px;
      padding: 28px 20px;
      margin-bottom: 24px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .input-label {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      margin-bottom: 12px;
      display: block;
      text-align: center;
    }

    .input-box {
      display: flex;
      align-items: center;
      background: #000;
      border: 3px solid #ffdd00;
      border-radius: 16px;
      padding: 5px 15px;
    }

    input[type="number"] {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #ffdd00;
      font-size: clamp(32px, 10vw, 48px);
      font-weight: 800;
      text-align: right;
      font-family: inherit;
    }

    .unit { color: #ffdd00; font-size: 20px; font-weight: 700; margin-left: 10px; }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 18px;
    }
    .btn {
      background: rgba(255,255,255,0.12);
      border: none;
      border-radius: 10px;
      color: #fff;
      padding: 12px 0;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:active { background: #ffdd00; color: #000; }

    /* 정보 수치 가독성 */
    .info-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    .info-card {
      background: rgba(255,255,255,0.05);
      padding: 16px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .info-card .label { color: rgba(255,255,255,0.4); font-size: 12px; margin-bottom: 4px; }
    .info-card .value { font-size: 17px; font-weight: 700; color: #eee; }

    /* 결과 리스트 */
    .detail-list {
      background: rgba(255,255,255,0.03);
      border-radius: 20px;
      padding: 8px 20px;
      margin-bottom: 24px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .row:last-child { border-bottom: none; }
    .row .label { color: rgba(255,255,255,0.5); font-size: 15px; }
    .row .val { font-weight: 600; font-size: 15px; }

    /* 하이라이트 수익 박스 */
    .summary-box {
      background: linear-gradient(135deg, #00c853 0%, #1b5e20 100%);
      border-radius: 24px;
      padding: 35px 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 200, 83, 0.2);
    }
    .summary-box.loss {
      background: linear-gradient(135deg, #ff5252 0%, #b71c1c 100%);
      box-shadow: 0 10px 30px rgba(255, 82, 82, 0.2);
    }

    .res-label { font-size: 14px; font-weight: 600; margin-bottom: 10px; opacity: 0.9; }
    .res-amount { font-size: clamp(34px, 11vw, 52px); font-weight: 900; margin-bottom: 5px; }
    .res-rate { font-size: 18px; font-weight: 700; }

    footer {
      margin-top: auto;
      padding: 40px 0 20px 0;
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🏢 우리사주 계산기</h1>
  <p class="subtitle">실시간 수익 현황</p>

  <div class="input-section">
    <span class="input-label">현재 주가 입력</span>
    <div class="input-box">
      <input type="number" id="currentPrice" value="100000" oninput="calculate()" pattern="\d*">
      <span class="unit">원</span>
    </div>
    <div class="quick-grid">
      <button class="btn" onclick="setPrice(50000)">5만</button>
      <button class="btn" onclick="setPrice(70000)">7만</button>
      <button class="btn" onclick="setPrice(100000)">10만</button>
      <button class="btn" onclick="setPrice(150000)">15만</button>
    </div>
  </div>

  <div class="info-container">
    <div class="info-card"><div class="label">보유 주식</div><div class="value">1,893 주</div></div>
    <div class="info-card"><div class="label">취득 단가</div><div class="value">50,000 원</div></div>
    <div class="info-card"><div class="label">총 대출액</div><div class="value" style="color:#ff8a8a">6,160만</div></div>
    <div class="info-card"><div class="label">타인 주식</div><div class="value">600 주</div></div>
  </div>

  <div class="detail-list">
    <div class="row"><span class="label">보유분 평가액</span><span class="val" id="holdingValue">—</span></div>
    <div class="row"><span class="label">타인분 평가액</span><span class="val" id="otherValue">—</span></div>
    <div class="row"><span class="label" style="color:#fff; font-weight:700;">전체 합계</span><span class="val" id="totalValue" style="color:#ffdd00;">—</span></div>
  </div>

  <div class="summary-box" id="profitBox">
    <div class="res-label">🎯 예상 순 수익 (보유분 - 대출)</div>
    <div class="res-amount" id="profitAmount">—</div>
    <div class="res-rate" id="profitRate"></div>
  </div>

  <footer>
    기준: 취득가 50,000원 / 대출 6,160만원<br>
    © 2024 Stock Calculator
  </footer>
</div>

<script>
  const MY_SHARES      = 1893;
  const OTHER_SHARES   = 600;
  const ACQUIRE_PRICE  = 50000;
  const LOAN_AMOUNT    = 61600000;

  function fmt(n) { return new Intl.NumberFormat('ko-KR').format(n) + ' 원'; }

  function setPrice(p) {
    document.getElementById('currentPrice').value = p;
    calculate();
  }

  function calculate() {
    const price = parseFloat(document.getElementById('currentPrice').value) || 0;
    const holdingVal  = MY_SHARES * price;
    const otherVal    = OTHER_SHARES * price;
    const totalVal    = holdingVal + otherVal;
    const profit      = holdingVal - LOAN_AMOUNT;
    const costBase    = MY_SHARES * ACQUIRE_PRICE;
    const rateVsCost  = costBase > 0 ? ((profit / costBase) * 100) : 0;

    document.getElementById('holdingValue').textContent = fmt(holdingVal);
    document.getElementById('otherValue').textContent   = fmt(otherVal);
    document.getElementById('totalValue').textContent   = fmt(totalVal);

    const amtEl   = document.getElementById('profitAmount');
    const rateEl  = document.getElementById('profitRate');
    const boxEl   = document.getElementById('profitBox');

    amtEl.textContent  = (profit >= 0 ? '+' : '') + fmt(profit);
    rateEl.textContent = (rateVsCost >= 0 ? '+' : '') + rateVsCost.toFixed(1) + '% (원가대비)';

    if (profit >= 0) {
      boxEl.classList.remove('loss');
    } else {
      boxEl.classList.add('loss');
    }
  }
  calculate();
</script>

</body>
</html>
