<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>우리사주 수익 계산기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { overflow-x: hidden; width: 100%; background: #1a1a2e; }

    body {
      font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      color: #fff;
      padding-bottom: 40px;
    }

    .container {
      width: 100%;
      /* 가로 폭을 기존 480px에서 550px로 확장 */
      max-width: 550px; 
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px; /* 요소 간 간격을 조금 더 여유 있게 조정 */
    }

    h1 {
      font-size: clamp(24px, 8vw, 30px);
      font-weight: 800;
      text-align: center;
      margin-top: 10px;
    }

    .subtitle {
      color: rgba(255,255,255,0.4);
      font-size: 14px;
      text-align: center;
      margin-top: -15px;
    }

    /* 입력 섹션: 가로가 넓어진 만큼 패딩과 폰트 크기 최적화 */
    .input-section {
      background: rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 28px 24px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .input-label {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      margin-bottom: 12px;
      display: block;
    }

    .input-wrapper {
      background: #000;
      border: 3px solid #ffdd00;
      border-radius: 16px;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      box-shadow: 0 4px 15px rgba(255, 221, 0, 0.15);
    }

    input[type="number"] {
      flex: 1;
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: #ffdd00;
      font-size: clamp(32px, 10vw, 44px);
      font-weight: 800;
      text-align: right;
      font-family: inherit;
    }

    .unit {
      color: #ffdd00;
      font-size: 22px;
      font-weight: 700;
      margin-left: 10px;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 20px;
    }
    .btn {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px;
      color: #fff;
      padding: 12px 0;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn:active { background: #ffdd00; color: #000; transform: scale(0.95); }

    /* 정보 카드: 가로가 넓어져서 수치 확인이 더 편해짐 */
    .info-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .info-card {
      background: rgba(255,255,255,0.06);
      padding: 18px;
      border-radius: 18px;
    }
    .info-card .label { color: rgba(255,255,255,0.4); font-size: 12px; margin-bottom: 6px; }
    .info-card .value { font-size: 17px; font-weight: 700; }

    /* 상세 리스트 */
    .detail-list {
      background: rgba(255,255,255,0.03);
      border-radius: 20px;
      padding: 10px 24px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      padding: 15px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 15px;
    }
    .row:last-child { border-bottom: none; }
    .row .label { color: rgba(255,255,255,0.5); }
    .row .val { font-weight: 600; }

    /* 수익 박스: 가로 확장에 맞춰 폰트와 패딩 강조 */
    .summary-box {
      background: linear-gradient(135deg, #00c853 0%, #1b5e20 100%);
      border-radius: 24px;
      padding: 35px 20px;
      text-align: center;
      box-shadow: 0 15px 30px rgba(0,0,0,0.3);
    }
    .summary-box.loss {
      background: linear-gradient(135deg, #ff5252 0%, #b71c1c 100%);
    }

    .res-label { font-size: 14px; margin-bottom: 10px; font-weight: 600; opacity: 0.9; }
    .res-amount { font-size: clamp(36px, 11vw, 48px); font-weight: 900; margin-bottom: 6px; }
    .res-rate { font-size: 18px; font-weight: 700; }

    footer {
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      margin-top: 10px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🏢 우리사주 계산기</h1>
  <p class="subtitle">실시간 수익 현황</p>

  <div class="input-section">
    <span class="input-label">현재 주가 입력 (원)</span>
    <div class="input-wrapper">
      <input type="number" id="currentPrice" value="100000" oninput="calculate()" pattern="\d*">
      <span class="unit">원</span>
    </div>
    <div class="quick-grid">
      <button class="btn" onclick="setPrice(50000)">5만</button>
      <button class="btn" onclick="setPrice(70000)">7만</button>
      <button class="btn" onclick="setPrice(100000)">10만</button>
      <button class="btn" onclick="setPrice(150000)">15만</button>
    </div>
  </div>

  <div class="info-container">
    <div class="info-card"><div class="label">보유 주식</div><div class="value">1,893 주</div></div>
    <div class="info-card"><div class="label">취득 단가</div><div class="value">50,000 원</div></div>
    <div class="info-card"><div class="label">총 대출액</div><div class="value" style="color:#ff8a8a">6,160만 원</div></div>
    <div class="info-card"><div class="label">타인 주식</div><div class="value">600 주</div></div>
  </div>

  <div class="detail-list">
    <div class="row"><span class="label">보유분 평가액</span><span class="val" id="holdingValue">—</span></div>
    <div class="row"><span class="label">타인분 평가액</span><span class="val" id="otherValue">—</span></div>
    <div class="row" style="border:none;"><span class="label" style="color:#fff; font-weight:700;">전체 합계</span><span class="val" id="totalValue" style="color:#ffdd00;">—</span></div>
  </div>

  <div class="summary-box" id="profitBox">
    <div class="res-label">🎯 예상 순 수익 (보유분 - 대출)</div>
    <div class="res-amount" id="profitAmount">—</div>
    <div class="res-rate" id="profitRate"></div>
  </div>

  <footer>
    기준: 취득가 50,000원 / 대출 6,160만원<br>
    © 2026 Stock Calculator
  </footer>
</div>

<script>
  const MY_SHARES      = 1893;
  const OTHER_SHARES   = 600;
  const ACQUIRE_PRICE  = 50000;
  const LOAN_AMOUNT    = 61600000;

  function fmt(n) { return new Intl.NumberFormat('ko-KR').format(n) + ' 원'; }

  function setPrice(p) {
    document.getElementById('currentPrice').value = p;
    calculate();
  }

  function calculate() {
    const price = parseFloat(document.getElementById('currentPrice').value) || 0;
    const holdingVal  = MY_SHARES * price;
    const otherVal    = OTHER_SHARES * price;
    const totalVal    = holdingVal + otherVal;
    const profit      = holdingVal - LOAN_AMOUNT;
    const costBase    = MY_SHARES * ACQUIRE_PRICE;
    const rateVsCost  = costBase > 0 ? ((profit / costBase) * 100) : 0;

    document.getElementById('holdingValue').textContent = fmt(holdingVal);
    document.getElementById('otherValue').textContent   = fmt(otherVal);
    document.getElementById('totalValue').textContent   = fmt(totalVal);

    const amtEl   = document.getElementById('profitAmount');
    const rateEl  = document.getElementById('profitRate');
    const boxEl   = document.getElementById('profitBox');

    amtEl.textContent  = (profit >= 0 ? '+' : '') + fmt(profit);
    rateEl.textContent = (rateVsCost >= 0 ? '+' : '') + rateVsCost.toFixed(1) + '% (원가대비)';

    if (profit >= 0) {
      boxEl.classList.remove('loss');
    } else {
      boxEl.classList.add('loss');
    }
  }
  calculate();
</script>

</body>
</html>
